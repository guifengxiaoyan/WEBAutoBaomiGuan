<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保密观自动刷课 - 在线版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(86, 171, 47, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .account-list {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .account-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .account-item:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .account-item.active {
            background: #e3f2fd;
            border-color: #2196f3;
        }

        .account-info {
            flex: 1;
        }

        .account-name {
            font-weight: 600;
            color: #333;
        }

        .account-nickname {
            color: #666;
            font-size: 0.9em;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-logged {
            background: #d4edda;
            color: #155724;
        }

        .status-not-logged {
            background: #f8d7da;
            color: #721c24;
        }

        .course-list {
            display: grid;
            gap: 15px;
        }

        .course-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .course-title {
            font-weight: 600;
            font-size: 1.1em;
            color: #333;
        }

        .course-status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-section {
            max-width: 500px;
            margin: 0 auto;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .log-area {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-line {
            margin-bottom: 5px;
        }

        .log-info { color: #4fc1ff; }
        .log-success { color: #6a9955; }
        .log-error { color: #f48771; }
        .log-warning { color: #dcdcaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>保密观自动刷课</h1>
            <p>2026 年度全国保密教育线上培训 - 在线辅助工具</p>
        </div>

        <div id="messageBox" class="message"></div>

        <div id="loginCard" class="card login-section">
            <h2 class="card-title">账号登录</h2>
            <div class="form-group">
                <label for="loginName">用户名</label>
                <input type="text" id="loginName" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()" style="width: 100%;">
                登录
            </button>

            <div id="savedAccounts" class="account-list" style="margin-top: 20px;"></div>
        </div>

        <div id="dashboardCard" class="card hidden">
            <h2 class="card-title">
                课程学习中心
                <span id="currentUser" style="font-size: 0.7em; color: #666; margin-left: 10px;"></span>
            </h2>

            <div class="action-buttons" style="margin-bottom: 20px;">
                <button class="btn btn-success" onclick="studyAllCourses()">
                    开始学习和考试
                </button>
                <button class="btn btn-warning" onclick="refreshProgress()">
                    刷新进度
                </button>
            </div>

            <div id="logArea" class="log-area"></div>
        </div>

        <div id="switchAccountCard" class="card hidden">
            <h2 class="card-title">切换账号</h2>
            <button class="btn btn-primary" onclick="showLogin()" style="margin-bottom: 15px;">
                返回登录
            </button>
            <div id="accountList" class="account-list"></div>
        </div>
    </div>

    <script>
        let currentToken = null;
        let currentLoginName = null;

        function showMessage(text, type = 'info') {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message ${type}`;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 5000);
        }

        function showLoading(btn, isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span> 加载中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.dataset.originalText || btn.textContent;
            }
        }

        async function handleLogin() {
            const loginName = document.getElementById('loginName').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!loginName || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            const btn = event.target;
            btn.dataset.originalText = btn.innerHTML;
            showLoading(btn, true);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ loginName, password })
                });

                const data = await response.json();

                if (data.success) {
                    currentToken = data.data.token;
                    currentLoginName = data.data.loginName;
                    showMessage('登录成功！', 'success');
                    showDashboard();
                    loadCourseList();
                } else {
                    showMessage(data.message || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error(error);
            } finally {
                showLoading(btn, false);
            }
        }

        async function loadSavedAccounts() {
            try {
                const response = await fetch('/api/accounts');
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    const container = document.getElementById('savedAccounts');
                    container.innerHTML = '<h4 style="margin-bottom: 10px; color: #555;">已保存的账号</h4>';

                    data.data.forEach(account => {
                        const div = document.createElement('div');
                        div.className = 'account-item';
                        div.innerHTML = `
                            <div class="account-info">
                                <div class="account-name">${account.loginName}</div>
                                <div class="account-nickname">${account.nickname || ''} ${account.label ? '(' + account.label + ')' : ''}</div>
                            </div>
                            <span class="status-badge status-logged">点击切换</span>
                        `;
                        div.onclick = () => switchAccount(account.loginName);
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('加载保存账号失败:', error);
            }
        }

        async function switchAccount(loginName) {
            try {
                const response = await fetch('/api/select-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginName })
                });

                const data = await response.json();

                if (data.success) {
                    currentToken = data.data.token;
                    currentLoginName = data.data.loginName;
                    showMessage('切换账号成功', 'success');
                    showDashboard();
                    loadCourseList();
                } else {
                    showMessage(data.message || '切换失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误', 'error');
            }
        }

        function showDashboard() {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('dashboardCard').classList.remove('hidden');
            document.getElementById('switchAccountCard').classList.remove('hidden');
            document.getElementById('currentUser').textContent = `当前用户：${currentLoginName}`;
            loadAccountList();
            loadCourseList();
        }

        function showLogin() {
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('dashboardCard').classList.add('hidden');
            document.getElementById('switchAccountCard').classList.add('hidden');
            currentToken = null;
            currentLoginName = null;
        }

        function loadAccountList() {
            loadSavedAccounts();
        }

        async function loadCourseList() {
            try {
                const response = await fetch('/api/course/list', {
                    headers: { 'token': currentToken }
                });

                const data = await response.json();

                if (data.success) {
                    displayProgress(data.data);
                } else {
                    showMessage(data.message || '加载课程失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误', 'error');
                console.error(error);
            }
        }
        
        function refreshProgress() {
            loadCourseList();
            log('正在刷新进度...', 'info');
        }

        function displayProgress(courses) {
            console.log('课程数据:', courses);
            log(`当前课程数：${courses.length}`, 'info');
        }

        async function loadProgress() {
            try {
                const response = await fetch('/api/course/progress', {
                    headers: { 'token': currentToken }
                });

                const data = await response.json();
                if (data.success) {
                    const progress = data.data.studyRate || 0;
                    document.getElementById('progressRate').textContent = `${Math.round(progress)}%`;
                }
            } catch (error) {
                console.error('加载进度失败:', error);
            }
        }

        async function studyCourse(lessonId) {
            const btn = event.target;
            btn.dataset.originalText = btn.innerHTML;
            showLoading(btn, true);
            log(`开始学习课程...`, 'info');

            try {
                const response = await fetch('/api/course/study', {
                    method: 'POST',
                    headers: {
                        'token': currentToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ lessonId })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('课程学习完成！', 'success');
                    log(`课程学习完成`, 'success');
                    loadCourseList();
                } else {
                    showMessage(data.message || '学习失败', 'error');
                    log(`学习失败：${data.message}`, 'error');
                }
            } catch (error) {
                showMessage('网络错误', 'error');
                log(`网络错误：${error.message}`, 'error');
            } finally {
                showLoading(btn, false);
            }
        }

        async function studyAllCourses() {
            const btn = event.target;
            btn.dataset.originalText = btn.innerHTML;
            showLoading(btn, true);

            log('开始学习和考试...', 'info');

            try {
                const response = await fetch('/api/course/study-all', {
                    method: 'POST',
                    headers: { 'token': currentToken }
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('学习和考试完成！', 'success');
                    log(`课程学习：${data.data.study ? '✓ 成功' : '✗ 失败'}`, data.data.study ? 'success' : 'error');
                    if (data.data.exam !== undefined) {
                        log(`考试完成：${data.data.exam ? '✓ 成功' : '✗ 失败'}`, data.data.exam ? 'success' : 'error');
                    }
                    refreshProgress();
                } else {
                    showMessage(data.message || '学习失败', 'error');
                    log(`批量学习失败：${data.message}`, 'error');
                }
            } catch (error) {
                showMessage('网络错误', 'error');
                log(`网络错误：${error.message}`, 'error');
            } finally {
                showLoading(btn, false);
            }
        }

        function log(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${time}] ${message}`;
            logArea.appendChild(line);
            logArea.scrollTop = logArea.scrollHeight;
        }

        window.onload = function() {
            loadSavedAccounts();
        };
    </script>
</body>
</html>
